# eclexiaiser manifest for cloud-sync-tuner

[project]
name = "cloud-sync-tuner"

[[functions]]
name = "process"
source = "src/main.rs"
energy-budget-mj = 80.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
